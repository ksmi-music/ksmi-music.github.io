<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSMI 심포지엄 사전등록</title>
    <style>
        .home {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .registration-info {
            background-color: #f5f5f5;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="tel"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .radio-group {
            margin-top: 10px;
        }
        
        .radio-option {
            margin-bottom: 10px;
        }
        
        .submit-button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .submit-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="home">
        <section class="registration-form">
            <h2>제 1차 KSMI-한국 음악정보학회 심포지엄 사전등록</h2>
            
            <div class="registration-info">
                <p><strong>등록 기간:</strong> 2025년 4월 6일 일요일 오후 11시 59분까지</p>
                <p><strong>행사 일시:</strong> 2025년 4월 18일 금요일</p>
                <p><strong>행사 장소:</strong> 한국과학기술원 (KAIST) 학술문화관 5F (정근모 컨퍼런스홀 + 존 해너홀)</p>
                <p><strong>결제 방식:</strong> 현재 결제 시스템이 구축 준비중에 있습니다. 사전 등록 후, 추후에 결제를 진행할 예정입니다.</p>
                <p><strong>기타 문의:</strong> ksmi2025@gmail.com</p>
            </div>

            <form class="registration-form-fields" action="/submit-registration" method="POST">
                <div class="form-group">
                    <label for="lastName">성</label>
                    <input type="text" id="lastName" name="lastName" placeholder="예: 홍" required>
                </div>

                <div class="form-group">
                    <label for="firstName">이름</label>
                    <input type="text" id="firstName" name="firstName" placeholder="예: 길동" required>
                </div>

                <div class="form-group">
                    <label for="affiliation">소속</label>
                    <input type="text" id="affiliation" name="affiliation" placeholder="예: 카이스트 Mac 랩" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="예: example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">전화번호</label>
                    <input type="tel" id="phone" name="phone" placeholder="예: 010-1234-5678" required>
                </div>

                <div class="form-group">
                    <label>구분 선택 *</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="student" name="registrationType" value="student" required>
                            <label for="student">학생 - 30,000₩</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="regular" name="registrationType" value="regular" required>
                            <label for="regular">일반 - 50,000₩</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-button">등록하기</button>
            </form>
        </section>
    </div>
</body>
</html>
